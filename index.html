<!DOCTYPE html>
<html lang="en">
	
<head>
	<meta charset="UTF-8">
	<meta name="author" content="MilaMassaro">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	
  <link rel="icon" type="image/svg+xml" href="">
	
	<link href="./styles/style.css" rel="stylesheet">
  <script defer src="./scripts/script.js"></script>

  <title>CSS to the rescue</title>
</head>

<body>

<main>

  <section>
    <h1>Spiraling</h1>
    <p>Mila Massaro</p>
  </section>
  
  <!-- Container: grid -->
  <section>

    <section>
      <div><div></div></div>
      <div><div></div></div>
      <div><div></div></div>
      <div><div></div></div>
      <div><div></div></div>
      <div><div></div></div>
      <div><div></div></div>
      <div><div></div></div>
      <div><div></div></div>
      <div><div></div></div>
      <div><div></div></div>
      <div><div></div></div>
      <div><div></div></div>
      <div><div></div></div>
      <div><div></div></div>
      <div><div></div></div>
      <div><div></div></div>
      <div><div></div></div>
      <div><div></div></div>
      <div><div></div></div>
      <div><div></div></div>
      <div><div></div></div>
      <div><div></div></div>
      <div><div></div></div>
      <div><div></div></div>
      <div><div></div></div>
      <div><div></div></div>
      <div><div></div></div>
      <div><div></div></div>
      <div><div></div></div>
      <div><div></div></div>
      <div><div></div></div>
    </section>

    <section>
      <h2>Modes</h2>
      <div>
        <div>
          <label><input type="radio" value="solid" name="border" checked> Solid border</label>
        </div>
        
        <div>
          <label><input type="radio" value="dotted" name="border"> Dotted border</label>
        </div>
      </div>

      <div>
        <div>
          <label><input type="radio" value="random" name="colors" checked> Random colors</label>
        </div>
        
        <div>
          <label><input type="radio" value="cmd" name="colors"> CMD colors</label>
        </div>
      </div>
    </section>

    <section>
      <h2>Sliders</h2>
      <h3>Colors</h3>
      <label>
        hue:
        <input type="range" min="0" max="1" step=".1" value=".9" name="hue" orient="horizontal">	
      </label>

      <label>
        saturation:
        <input type="range" min="0" max="1" step=".1" value="1" name="saturation" orient="horizontal">	
      </label>

      <label>
        lightness:
        <input type="range" min="0" max="1" step=".1" value=".5" name="lightness" orient="horizontal">	
      </label>


      <h3>Appearance</h3>
      <label>
        shape:
        <input type="range" min="0" max="1" step=".1" value=".5" name="shape" orient="horizontal">	
      </label>

      <label>
        scale:
        <input type="range" min=".5" max="1.25" step=".1" value="1" name="scale" orient="horizontal">	
      </label>

      <label>
        aspect-ratio:
        <input type="range" min="1" max="5" step=".1" value="1" name="ratio" orient="horizontal">	
      </label>
        
      <label>
        border-size:
        <input type="range" min="1" max="20" step="1" value="3" name="border-size" orient="horizontal">	
      </label>

      <h3>Animation</h3>
      <label>
        rotate:
        <input type="range" min="0" max="1" step=".1" value="1" name="rotate" orient="horizontal">	
      </label>

      <label>
        speed:
        <input type="range" min="3" max="25" step="1" value="10" name="speed" orient="horizontal">	
      </label>
    </section>


  </section>  

</main>

</body>
